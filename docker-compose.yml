# Stack de produção, escrita para rodar no Coolify.
#
# Um serviço só: a mesma aplicação serve a interface e a API, na porta 8037.
# O frontend é buildado dentro da imagem, então o deploy não depende de nada
# compilado na máquina de quem publica.
#
# Decisões que vêm das regras do Coolify:
#   - Nenhuma rede declarada: o Coolify cria uma rede isolada por stack.
#   - Nenhuma porta publicada: publicar contornaria o proxy e exporia o
#     serviço direto no host. O domínio é atribuído pelo painel.
#   - TLS não é tratado aqui; o Traefik do Coolify termina HTTPS.
#   - SERVICE_FQDN_APP_8037 faz o Coolify apontar o domínio para a 8037.
#
# Fora do Coolify: `make docker-up` publica a porta localmente.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bind no loopback, e não em 0.0.0.0: a porta fica alcançável só de dentro
    # da máquina, para debug local no servidor. O tráfego público continua
    # entrando pelo proxy da plataforma, que fala com o container pela rede
    # interna. Trocar por "8037:8037" exporia o serviço direto na internet,
    # sem TLS e sem o proxy na frente.
    ports:
      - "127.0.0.1:8037:8037"
    environment:
      # O Coolify substitui pelo domínio atribuído no painel e roteia o
      # tráfego para a porta 8037 do container.
      SERVICE_FQDN_APP_8037: ${SERVICE_FQDN_APP_8037:-}

      STORAGE_DIR: /data
      FRONTEND_DIR: /app/frontend

      # Chaves para uso programático da API. Continuam obrigatórias para
      # quem chama de fora; a interface usa o modo público abaixo.
      API_KEYS: ${API_KEYS:?defina API_KEYS com uma chave de 24+ caracteres}

      # Com true, quem abre o site usa a API sem chave. É o mesmo alcance
      # que um proxy injetando uma chave única para todo visitante teria —
      # a diferença é estar declarado aqui. Ponha false se o serviço não
      # deve ficar aberto a quem tiver o endereço.
      UI_PUBLIC: ${UI_PUBLIC:-true}

      # A interface é servida pela própria aplicação, então não há outra
      # origem para liberar.
      CORS_ORIGINS: ""

      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-209715200}
      MAX_STORAGE_BYTES: ${MAX_STORAGE_BYTES:-21474836480}
      MAX_STORAGE_BYTES_PER_KEY: ${MAX_STORAGE_BYTES_PER_KEY:-10737418240}
      MAX_ZIP_BYTES: ${MAX_ZIP_BYTES:-4294967296}
      RETENTION_HOURS: ${RETENTION_HOURS:-6}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-900}
      DELETE_AFTER_BATCH_DOWNLOAD: ${DELETE_AFTER_BATCH_DOWNLOAD:-false}
      RECONCILE_ENABLED: ${RECONCILE_ENABLED:-true}
      STORAGE_WARN_PERCENT: ${STORAGE_WARN_PERCENT:-80}
      MAX_CONCURRENT_FFMPEG: ${MAX_CONCURRENT_FFMPEG:-4}
      MAX_VARIATIONS_PER_JOB: ${MAX_VARIATIONS_PER_JOB:-50}
      FFMPEG_TIMEOUT_SECONDS: ${FFMPEG_TIMEOUT_SECONDS:-300}
      # Os dois abaixo existem para serem medidos no servidor: mudar e
      # reiniciar o container basta, não precisa rebuildar a imagem.
      FFMPEG_PRESET: ${FFMPEG_PRESET:-veryfast}
      FFMPEG_THREADS: ${FFMPEG_THREADS:-0}
      RATE_LIMIT_JOBS_PER_HOUR: ${RATE_LIMIT_JOBS_PER_HOUR:-20}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      LOG_JSON: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # Uploads, saídas e o banco. Volume nomeado sobrevive a redeploy e a
      # troca de imagem — sem ele, todo deploy perderia os jobs.
      - storage:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8037/api/v1/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # FFmpeg é o consumidor de CPU e memória do sistema. Sem teto, um job
    # grande deixa a máquina inteira sem resposta.
    deploy:
      resources:
        limits:
          cpus: "${API_CPUS:-4.0}"
          memory: ${API_MEMORY:-4g}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  storage:
