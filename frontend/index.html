<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gerador de variações de vídeo</title>

    <meta
      name="description"
      content="Gere várias cópias de um vídeo, cada uma com identificação
               de arquivo diferente, para publicar o mesmo criativo sem
               ser tratado como repetido."
    />

    <!-- A barra do navegador acompanha o tema do sistema. -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#eef1f3"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0c1215"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
